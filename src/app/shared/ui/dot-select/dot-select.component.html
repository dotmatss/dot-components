<label class="block space-y-2">
  @if (label()) {
    <span class="text-sm font-medium text-black">{{ label() }}</span>
  }
  <div class="relative">
    <select [class]="selectClass()" [disabled]="disabled()">
      @if (placeholder()) {
        <option value="" disabled selected hidden>{{ placeholder() }}</option>
      }
      @for (option of options(); track option.value) {
        <option [value]="option.value">{{ option.label }}</option>
      }
    </select>
    <svg
      viewBox="0 0 24 24"
      class="pointer-events-none absolute right-4 top-1/2 h-4 w-4 -translate-y-1/2 text-zinc-500"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <path d="m6 9 6 6 6-6"></path>
    </svg>
  </div>
  @if (hint() && !error()) {
    <span class="block text-xs font-medium text-zinc-600">{{ hint() }}</span>
  }
  @if (error()) {
    <span class="block text-xs font-semibold text-red-600">{{ error() }}</span>
  }
</label>
