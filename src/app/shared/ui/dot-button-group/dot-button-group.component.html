<div class="inline-flex overflow-hidden rounded-2xl border border-zinc-200 bg-white p-1">
  @for (item of items(); track item.value) {
    <button
      type="button"
      [class]="buttonClass(item.value)"
      (click)="selectedChange.emit(item.value)"
    >
      {{ item.label }}
    </button>
  }
</div>
