<div class="rounded-3xl border border-zinc-200 bg-white">
  <button
    type="button"
    class="flex w-full items-center justify-between gap-4 px-5 py-4 text-left"
    (click)="open.set(!open())"
  >
    <span class="text-sm font-semibold text-black">{{ title() }}</span>
    <span class="text-zinc-500">{{ open() ? '-' : '+' }}</span>
  </button>
  @if (open()) {
    <div class="border-t border-zinc-200 px-5 py-4 text-sm leading-6 text-zinc-600">
      <ng-content></ng-content>
    </div>
  }
</div>
