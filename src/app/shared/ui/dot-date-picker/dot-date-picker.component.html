<div class="rounded-[28px] border border-zinc-200 bg-white p-5">
  @if (label()) {
    <p class="text-sm font-semibold text-black">{{ label() }}</p>
  }
  <p class="mt-1 text-sm text-zinc-600">{{ value() || placeholder() }}</p>
  <div class="mt-4">
    <dot-calendar [selected]="value()" (selectedChange)="value.set($event)"></dot-calendar>
  </div>
</div>
