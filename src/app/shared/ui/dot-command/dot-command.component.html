<div class="rounded-[28px] border border-zinc-200 bg-white p-4">
  <dot-input label="" placeholder="Type a command..." />
  <div class="mt-4 space-y-2">
    @for (item of items(); track item.label) {
      <button type="button" class="flex w-full items-center justify-between rounded-2xl px-4 py-3 text-left transition hover:bg-zinc-50">
        <span class="text-sm font-semibold text-black">{{ item.label }}</span>
        @if (item.hint) {
          <span class="text-xs text-zinc-500">{{ item.hint }}</span>
        }
      </button>
    }
  </div>
</div>
