<div class="overflow-hidden rounded-[28px] border border-zinc-200 bg-white">
  <table class="w-full border-collapse text-left">
    <thead class="bg-zinc-50">
      <tr>
        @for (column of columns(); track column.label) {
          <th class="px-5 py-4 text-xs font-semibold uppercase tracking-[0.22em] text-zinc-500">
            {{ column.label }}
          </th>
        }
      </tr>
    </thead>
    <tbody>
      @for (row of rows(); track $index) {
        <tr class="border-t border-zinc-200">
          @for (cell of row.cells; track $index) {
            <td class="px-5 py-4 text-sm text-black">{{ cell }}</td>
          }
        </tr>
      }
    </tbody>
  </table>
</div>
