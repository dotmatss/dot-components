<section [class]="dialogClass()">
  <div class="flex items-start justify-between gap-4">
    <div class="space-y-1">
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-zinc-500">
        Dialog
      </p>
      <h3 class="text-xl font-semibold tracking-tight text-black">{{ title() }}</h3>
      <p class="text-sm leading-6 text-zinc-600">{{ description() }}</p>
    </div>

    <button
      type="button"
      class="rounded-full px-2 py-1 text-sm font-semibold text-zinc-500 transition hover:bg-zinc-100 hover:text-black"
      [attr.aria-label]="closeLabel()"
      (click)="dismiss.emit()"
    >
      x
    </button>
  </div>

  <div class="mt-5">
    <ng-content></ng-content>
  </div>

  <div class="mt-6 flex flex-wrap justify-end gap-3">
    <dot-button variant="outline" size="sm" (pressed)="dismiss.emit()">{{ cancelLabel() }}</dot-button>
    <dot-button variant="solid" size="sm" (pressed)="confirm.emit()">{{ actionLabel() }}</dot-button>
  </div>
</section>
