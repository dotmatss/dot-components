<div class="flex flex-wrap items-center gap-2 rounded-3xl border border-zinc-200 bg-white p-2">
  @for (item of items(); track item.label) {
    <a [href]="item.href" class="rounded-2xl px-4 py-2.5 text-sm font-medium text-zinc-700 transition hover:bg-zinc-100 hover:text-black">
      {{ item.label }}
    </a>
  }
</div>
