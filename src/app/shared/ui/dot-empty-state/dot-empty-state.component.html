<div class="rounded-[28px] border border-dashed border-zinc-300 bg-zinc-50 p-8 text-center">
  <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl border border-zinc-200 bg-white">
    <span class="text-xl font-semibold text-black">!</span>
  </div>
  <h3 class="mt-5 text-xl font-semibold tracking-tight text-black">{{ title() }}</h3>
  <p class="mx-auto mt-2 max-w-md text-sm leading-6 text-zinc-600">{{ description() }}</p>
  <div class="mt-6 flex justify-center gap-3">
    <dot-button variant="solid" size="sm" (pressed)="action.emit()">{{ actionLabel() }}</dot-button>
    @if (secondaryLabel()) {
      <dot-button variant="outline" size="sm" (pressed)="secondary.emit()">{{ secondaryLabel() }}</dot-button>
    }
  </div>
</div>
