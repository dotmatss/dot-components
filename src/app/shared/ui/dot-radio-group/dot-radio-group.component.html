<div class="rounded-[28px] border border-zinc-200 bg-white p-4">
  @if (label()) {
    <p class="mb-3 text-sm font-semibold text-black">{{ label() }}</p>
  }
  <div class="space-y-2">
    @for (option of options(); track option.value) {
      <button
        type="button"
        class="flex w-full items-start gap-3 rounded-2xl border border-zinc-200 px-4 py-3 text-left transition hover:bg-zinc-50"
        (click)="selectedChange.emit(option.value)"
      >
        <span class="mt-0.5 flex h-4 w-4 items-center justify-center rounded-full border transition" [class.border-black]="selected() === option.value" [class.border-zinc-300]="selected() !== option.value">
          @if (selected() === option.value) {
            <span class="h-2 w-2 rounded-full bg-black"></span>
          }
        </span>
        <span>
          <span class="block text-sm font-semibold text-black">{{ option.label }}</span>
          @if (option.description) {
            <span class="mt-0.5 block text-sm leading-6 text-zinc-600">{{ option.description }}</span>
          }
        </span>
      </button>
    }
  </div>
</div>
