<div [class]="cardClass()">
  <p class="text-xs font-semibold uppercase tracking-[0.24em] text-zinc-500">{{ label() }}</p>
  <p class="mt-3 text-5xl font-semibold tracking-tight text-black">{{ value() }}</p>
  @if (trend()) {
    <p class="mt-2 text-sm font-medium text-zinc-600">{{ trend() }}</p>
  }
</div>
