<button
  type="button"
  class="inline-flex items-center gap-3 text-sm text-black disabled:cursor-not-allowed"
  [disabled]="disabled()"
  (click)="select()"
>
  <span [class]="ringClass()">
    @if (selected()) {
      <span class="h-2 w-2 rounded-full bg-black"></span>
    }
  </span>
  <span>{{ label() }}</span>
</button>
