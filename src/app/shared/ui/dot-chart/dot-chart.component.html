<div class="rounded-[28px] border border-zinc-200 bg-white p-5">
  @if (title()) {
    <div class="mb-4 flex items-end justify-between gap-4">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.24em] text-zinc-500">{{ title() }}</p>
        @if (description()) {
          <p class="mt-1 text-sm text-zinc-600">{{ description() }}</p>
        }
      </div>
      @if (summary()) {
        <p class="text-sm font-semibold text-black">{{ summary() }}</p>
      }
    </div>
  }

  <svg viewBox="0 0 320 160" class="h-44 w-full" aria-hidden="true">
    <path [attr.d]="areaPath()" class="fill-zinc-100"></path>
    <path [attr.d]="linePath()" class="fill-none stroke-black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
    @for (point of points(); track point.index) {
      <circle [attr.cx]="point.x" [attr.cy]="point.y" r="4.5" class="fill-black"></circle>
    }
  </svg>
</div>
