<div class="space-y-3 rounded-3xl border border-zinc-200 bg-white p-3">
  @for (item of items(); track item.title; let index = $index) {
    <div class="overflow-hidden rounded-2xl border border-zinc-200">
      <button
        type="button"
        class="flex w-full items-center justify-between gap-4 px-4 py-3 text-left transition hover:bg-zinc-50"
        (click)="toggle(index)"
      >
        <span class="text-sm font-semibold text-black">{{ item.title }}</span>
        <span
          class="text-lg leading-none text-zinc-500 transition-transform duration-200 ease-out"
          [class.rotate-180]="openIndex() === index"
        >
          ›
        </span>
      </button>
      <div [class]="panelClass(openIndex() === index)">
        <div class="min-h-0 overflow-hidden">
          <div class="border-t border-zinc-200 bg-zinc-50 px-4 py-3 text-sm leading-6 text-zinc-600">
            {{ item.content }}
          </div>
        </div>
      </div>
    </div>
  }
</div>
