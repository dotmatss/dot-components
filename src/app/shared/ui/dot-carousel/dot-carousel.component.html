<div class="overflow-hidden rounded-[28px] border border-zinc-200 bg-white p-5">
  <div class="flex items-center justify-between gap-4">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-zinc-500">{{ title() }}</p>
      <p class="mt-1 text-sm text-zinc-600">{{ description() }}</p>
    </div>
    <div class="flex gap-2">
      <button type="button" class="rounded-xl border border-zinc-200 px-3 py-2 text-sm font-semibold text-zinc-600 transition hover:bg-zinc-100" (click)="previous()">Prev</button>
      <button type="button" class="rounded-xl border border-zinc-200 px-3 py-2 text-sm font-semibold text-zinc-600 transition hover:bg-zinc-100" (click)="next()">Next</button>
    </div>
  </div>

  @if (activeItem(); as item) {
    <div class="mt-4 rounded-[24px] bg-zinc-50 p-6">
      <p class="text-lg font-semibold text-black">{{ item.title }}</p>
      <p class="mt-2 text-sm leading-6 text-zinc-600">{{ item.description }}</p>
    </div>
  }
</div>
