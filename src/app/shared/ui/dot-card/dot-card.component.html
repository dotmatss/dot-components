<section [class]="cardClass()">
  @if (showHeader() && (eyebrow() || title() || description())) {
    <div class="space-y-2">
      @if (eyebrow()) {
        <p class="text-xs font-semibold uppercase tracking-[0.24em] text-zinc-500 dark:text-zinc-400">
          {{ eyebrow() }}
        </p>
      }
      <div class="space-y-1">
        @if (title()) {
          <h3 class="text-xl font-semibold tracking-tight text-black dark:text-zinc-50">
            {{ title() }}
          </h3>
        }
        @if (description()) {
          <p class="text-sm leading-6 text-zinc-600 dark:text-zinc-300">
            {{ description() }}
          </p>
        }
      </div>
    </div>
  }

  @if (showContent()) {
    <div class="mt-5">
      <ng-content></ng-content>
    </div>
  }

  @if (showFooter() && footer()) {
    <div class="mt-6 border-t border-zinc-200 pt-4 text-sm text-zinc-600 dark:border-zinc-800 dark:text-zinc-300">
      {{ footer() }}
    </div>
  }
</section>
