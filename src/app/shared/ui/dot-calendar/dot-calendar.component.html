<div class="rounded-[28px] border border-zinc-200 bg-white p-5">
  <div class="flex items-center justify-between gap-3">
    <button type="button" class="rounded-xl px-3 py-2 text-sm font-semibold text-zinc-600 transition hover:bg-zinc-100" (click)="previousMonth()">Prev</button>
    <div class="text-center">
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-zinc-500">{{ monthLabel() }}</p>
    </div>
    <button type="button" class="rounded-xl px-3 py-2 text-sm font-semibold text-zinc-600 transition hover:bg-zinc-100" (click)="nextMonth()">Next</button>
  </div>

  <div class="mt-4 grid grid-cols-7 gap-2 text-center text-xs font-semibold uppercase tracking-[0.18em] text-zinc-500">
    @for (day of weekDays; track day) {
      <span>{{ day }}</span>
    }
  </div>

  <div class="mt-3 grid grid-cols-7 gap-2">
    @for (day of days(); track day.key) {
      <button
        type="button"
        class="rounded-2xl px-0 py-3 text-sm font-semibold transition"
        [class.text-zinc-300]="!day.inMonth"
        [class.bg-black]="day.selected"
        [class.text-white]="day.selected"
        [class.hover:bg-zinc-100]="!day.selected"
        [class.hover:text-black]="!day.selected"
        (click)="selectDay(day)"
      >
        {{ day.label }}
      </button>
    }
  </div>
</div>
