<div class="rounded-[28px] border border-zinc-200 bg-white p-5">
  <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-zinc-500">{{ title() }}</p>
      <p class="mt-1 text-sm text-zinc-600">{{ description() }}</p>
    </div>
    <div class="w-full lg:max-w-xs">
      <input
        type="text"
        placeholder="Search rows..."
        [value]="query()"
        (input)="setQuery($event)"
        class="w-full rounded-2xl border border-zinc-300 bg-white px-4 py-3 text-[15px] text-black placeholder:text-zinc-500 shadow-sm transition focus:border-black focus:outline-none focus:ring-2 focus:ring-black/10"
      />
    </div>
  </div>

  <div class="mt-5">
    <dot-table [columns]="columns()" [rows]="filteredRows()"></dot-table>
  </div>
</div>
