<div class="flex flex-wrap items-center justify-between gap-3 rounded-3xl border border-zinc-200 bg-white p-3">
  <button type="button" class="rounded-xl px-3 py-2 text-sm font-medium text-zinc-600 transition hover:bg-zinc-100" (click)="previous.emit()">
    Previous
  </button>
  <div class="flex flex-wrap items-center gap-2">
    @for (page of pages(); track page) {
      <button
        type="button"
        class="rounded-xl px-3 py-2 text-sm font-semibold transition"
        [class.bg-black]="page === currentPage()"
        [class.text-white]="page === currentPage()"
        [class.text-zinc-700]="page !== currentPage()"
        [class.hover:bg-zinc-100]="page !== currentPage()"
        (click)="pageSelected.emit(page)"
      >
        {{ page }}
      </button>
    }
  </div>
  <button type="button" class="rounded-xl px-3 py-2 text-sm font-medium text-zinc-600 transition hover:bg-zinc-100" (click)="next.emit()">
    Next
  </button>
</div>
